<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>DOOM</title>

<style>
html,body{
margin:0;
padding:0;
background:black;
overflow:hidden;
height:100%;
display:flex;
justify-content:center;
align-items:center;
touch-action:none;
}

canvas{
image-rendering:pixelated;
max-width:100vw;
max-height:100vh;
}

/* Toggle */
#toggleControls{
position:fixed;
top:10px;
right:10px;
z-index:20;
background:rgba(0,0,0,.7);
color:white;
border:none;
padding:8px 12px;
border-radius:8px;
}

/* Controls */
#controls{
position:fixed;
bottom:20px;
left:0;
right:0;
display:flex;
justify-content:space-between;
z-index:10;
pointer-events:none;
}

/* Joystick */
#joystick{
width:120px;
height:120px;
margin-left:20px;
background:rgba(255,255,255,.08);
border-radius:50%;
position:relative;
pointer-events:auto;
}

#stick{
width:50px;
height:50px;
background:rgba(255,255,255,.5);
border-radius:50%;
position:absolute;
left:35px;
top:35px;
}

/* Buttons */
.buttons{
display:flex;
flex-direction:column;
gap:10px;
margin-right:20px;
pointer-events:auto;
}

.btn{
width:60px;
height:60px;
font-size:18px;
background:rgba(0,0,0,.7);
color:white;
border:none;
border-radius:10px;
}
.hidden{display:none;}
</style>
</head>

<body>

<canvas id="canvas"></canvas>

<button id="toggleControls">Hide Controls</button>

<script src="https://cdn.jsdelivr.net/npm/eruda"></script>
<script>eruda.init();</script>

<script>
/* Emscripten Module */
var Module = {
canvas: document.getElementById("canvas"),
print: console.log,
printErr: console.error
};
</script>

<script src="chocolate-doom.js"></script>

<div id="controls">
  <div id="joystick">
    <div id="stick"></div>
  </div>

  <div class="buttons">
    <button class="btn" data-key="32">🔥</button>
    <button class="btn" data-key="13">USE</button>
  </div>
</div>

<script>

/* IMPORTANT: Focus canvas */
Module.canvas.setAttribute("tabindex","0");
Module.canvas.focus();

/* Send keyboard to canvas */
function sendKey(code,type){
  const event = new KeyboardEvent(type,{
    keyCode:code,
    which:code,
    bubbles:true
  });
  Module.canvas.dispatchEvent(event);
}

/* Action buttons */
document.querySelectorAll(".btn").forEach(btn=>{
  const code=parseInt(btn.dataset.key);

  btn.addEventListener("touchstart",e=>{
    e.preventDefault();
    sendKey(code,"keydown");
  });

  btn.addEventListener("touchend",e=>{
    e.preventDefault();
    sendKey(code,"keyup");
  });
});

/* Auto hide on desktop */
const controls=document.getElementById("controls");
const toggle=document.getElementById("toggleControls");

function isTouch(){
  return ('ontouchstart' in window) || navigator.maxTouchPoints>0;
}

if(!isTouch()){
  controls.classList.add("hidden");
  toggle.textContent="Show Controls";
}

/* Toggle button */
toggle.onclick=()=>{
  controls.classList.toggle("hidden");
  toggle.textContent=
    controls.classList.contains("hidden")
    ? "Show Controls"
    : "Hide Controls";
};

/* JOYSTICK MOVEMENT */
const joystick=document.getElementById("joystick");
const stick=document.getElementById("stick");

let active=false;

joystick.addEventListener("touchstart",()=>active=true);

joystick.addEventListener("touchend",()=>{
  active=false;
  stick.style.left="35px";
  stick.style.top="35px";

  sendKey(37,"keyup");
  sendKey(38,"keyup");
  sendKey(39,"keyup");
  sendKey(40,"keyup");
});

joystick.addEventListener("touchmove",(e)=>{
  if(!active)return;

  const rect=joystick.getBoundingClientRect();
  const x=e.touches[0].clientX-rect.left;
  const y=e.touches[0].clientY-rect.top;

  const dx=x-60;
  const dy=y-60;

  const max=40;
  const clampedX=Math.max(-max,Math.min(max,dx));
  const clampedY=Math.max(-max,Math.min(max,dy));

  stick.style.left=(60+clampedX-25)+"px";
  stick.style.top=(60+clampedY-25)+"px";

  /* Movement keys */
  sendKey(38, dy<-20 ? "keydown":"keyup");
  sendKey(40, dy>20 ? "keydown":"keyup");
  sendKey(37, dx<-20 ? "keydown":"keyup");
  sendKey(39, dx>20 ? "keydown":"keyup");
});

/* SWIPE TO TURN */
let lastX=null;

document.addEventListener("touchmove",(e)=>{
  const x=e.touches[0].clientX;

  if(lastX===null){
    lastX=x;
    return;
  }

  const diff=x-lastX;

  if(Math.abs(diff)>10){
    sendKey(diff>0?39:37,"keydown");
    setTimeout(()=>sendKey(diff>0?39:37,"keyup"),40);
  }

  lastX=x;
});

document.addEventListener("touchend",()=>lastX=null);

</script>

</body>
</html>
