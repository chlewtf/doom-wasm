<!doctype html>
<html lang="en">
<head>

<meta charset="utf-8">

<meta name="viewport"
content="width=device-width,initial-scale=1,user-scalable=no">

<title>DOOM</title>

<style>

html,body{
margin:0;
padding:0;
background:black;
overflow:hidden;
height:100%;
display:flex;
justify-content:center;
align-items:center;
touch-action:none;
}

canvas{
image-rendering:pixelated;
max-width:100vw;
max-height:100vh;
}

/* toggle */

#toggleControls{
position:fixed;
top:10px;
right:10px;
z-index:20;
background:rgba(0,0,0,.6);
color:white;
border:none;
padding:8px 12px;
border-radius:8px;
}

/* controls */

#mobileControls{
position:fixed;
bottom:20px;
left:0;
right:0;
display:flex;
justify-content:space-between;
pointer-events:none;
z-index:10;
}

/* joystick */

#joystick{
width:120px;
height:120px;
margin-left:20px;
background:rgba(255,255,255,.08);
border-radius:50%;
position:relative;
pointer-events:auto;
}

#stick{
width:50px;
height:50px;
background:rgba(255,255,255,.5);
border-radius:50%;
position:absolute;
left:35px;
top:35px;
}

/* buttons */

.actionButtons{
display:flex;
flex-direction:column;
gap:10px;
margin-right:20px;
pointer-events:auto;
}

.ctrlBtn{
width:60px;
height:60px;
font-size:18px;
background:rgba(0,0,0,.6);
color:white;
border:none;
border-radius:10px;
}

</style>
</head>

<body>

<canvas id="canvas"></canvas>

<button id="toggleControls">Hide Controls</button>

<script src="https://cdn.jsdelivr.net/npm/eruda"></script>
<script>eruda.init()</script>

<script>

var Module = {
canvas: document.getElementById("canvas"),
print: text => console.log(text),
printErr: text => console.error(text)
}

</script>

<script src="chocolate-doom.js"></script>


<div id="mobileControls">

<div id="joystick">
<div id="stick"></div>
</div>

<div class="actionButtons">

<button class="ctrlBtn" data-key="32">🔥</button>
<button class="ctrlBtn" data-key="13">USE</button>

</div>

</div>


<script>

/* keyboard emulator */

function sendKey(code,type){

const event=new KeyboardEvent(type,{
keyCode:code,
which:code,
bubbles:true
})

document.dispatchEvent(event)

}

/* action buttons */

document.querySelectorAll(".ctrlBtn").forEach(btn=>{

const code=parseInt(btn.dataset.key)

btn.addEventListener("touchstart",e=>{
e.preventDefault()
sendKey(code,"keydown")
})

btn.addEventListener("touchend",e=>{
e.preventDefault()
sendKey(code,"keyup")
})

})

/* device detection */

const controls=document.getElementById("mobileControls")
const toggle=document.getElementById("toggleControls")

if(!("ontouchstart" in window)){
controls.style.display="none"
toggle.textContent="Show Controls"
}

toggle.onclick=()=>{

if(controls.style.display==="none"){
controls.style.display="flex"
toggle.textContent="Hide Controls"
}else{
controls.style.display="none"
toggle.textContent="Show Controls"
}

}

/* joystick */

const joystick=document.getElementById("joystick")
const stick=document.getElementById("stick")

let active=false

joystick.addEventListener("touchstart",()=>active=true)

joystick.addEventListener("touchend",()=>{

active=false

stick.style.left="35px"
stick.style.top="35px"

sendKey(38,"keyup")
sendKey(40,"keyup")
sendKey(37,"keyup")
sendKey(39,"keyup")

})

joystick.addEventListener("touchmove",(e)=>{

if(!active)return

const rect=joystick.getBoundingClientRect()

const x=e.touches[0].clientX-rect.left
const y=e.touches[0].clientY-rect.top

const dx=x-60
const dy=y-60

stick.style.left=(60+dx/2-25)+"px"
stick.style.top=(60+dy/2-25)+"px"

/* move */

if(dy<-20) sendKey(38,"keydown")
else sendKey(38,"keyup")

if(dy>20) sendKey(40,"keydown")
else sendKey(40,"keyup")

if(dx<-20) sendKey(37,"keydown")
else sendKey(37,"keyup")

if(dx>20) sendKey(39,"keydown")
else sendKey(39,"keyup")

})

/* swipe turning */

let lastX=null

document.addEventListener("touchmove",(e)=>{

const x=e.touches[0].clientX

if(lastX===null){
lastX=x
return
}

const diff=x-lastX

if(Math.abs(diff)>10){

if(diff>0){
sendKey(39,"keydown")
setTimeout(()=>sendKey(39,"keyup"),40)
}else{
sendKey(37,"keydown")
setTimeout(()=>sendKey(37,"keyup"),40)
}

}

lastX=x

})

document.addEventListener("touchend",()=>lastX=null)

</script>

</body>
</html>
