<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">

<meta name="viewport"
content="width=device-width,initial-scale=1,user-scalable=no">

<title>DOOM</title>

<style>

html,body{
margin:0;
padding:0;
background:black;
overflow:hidden;
height:100%;
display:flex;
justify-content:center;
align-items:center;
touch-action:none;
}

canvas{
image-rendering:pixelated;
max-width:100vw;
max-height:100vh;
}

/* TOGGLE BUTTON */

#toggleControls{
position:fixed;
top:10px;
right:10px;
z-index:20;
background:rgba(0,0,0,0.6);
color:white;
border:none;
padding:8px 12px;
border-radius:8px;
font-size:14px;
}

/* CONTROLS */

#mobileControls{
position:fixed;
bottom:20px;
left:0;
right:0;
display:flex;
justify-content:space-between;
pointer-events:none;
z-index:10;
}

/* JOYSTICK */

#joystick{
width:120px;
height:120px;
margin-left:20px;
background:rgba(255,255,255,0.08);
border-radius:50%;
position:relative;
pointer-events:auto;
}

#stick{
width:50px;
height:50px;
background:rgba(255,255,255,0.5);
border-radius:50%;
position:absolute;
left:35px;
top:35px;
}

/* ACTION BUTTONS */

.actionButtons{
display:flex;
flex-direction:column;
gap:10px;
margin-right:20px;
pointer-events:auto;
}

.ctrlBtn{
background:rgba(0,0,0,0.6);
color:white;
border:none;
border-radius:10px;
font-size:18px;
width:60px;
height:60px;
}

.ctrlBtn:active{
background:rgba(255,255,255,0.3);
}

.hidden{
display:none;
}

</style>
</head>

<body>

<canvas id="canvas"></canvas>

<button id="toggleControls">Hide Controls</button>

<script src="https://cdn.jsdelivr.net/npm/eruda"></script>
<script>eruda.init();</script>

<script>

var Module = {

canvas: document.getElementById("canvas"),

print: function(text){
console.log(text);
},

printErr: function(text){
console.error(text);
}

};

</script>

<script src="chocolate-doom.js"></script>


<div id="mobileControls">

<div id="joystick">
<div id="stick"></div>
</div>

<div class="actionButtons">
<button class="ctrlBtn" data-key=" ">🔥</button>
<button class="ctrlBtn" data-key="e">USE</button>
</div>

</div>


<script>

/* KEY EMULATION */

function sendKey(key,type){

const event = new KeyboardEvent(type,{
key:key,
bubbles:true
})

document.dispatchEvent(event)

}

/* ACTION BUTTONS */

document.querySelectorAll(".ctrlBtn").forEach(btn=>{

const key = btn.dataset.key

btn.addEventListener("touchstart",e=>{
e.preventDefault()
sendKey(key,"keydown")
})

btn.addEventListener("touchend",e=>{
e.preventDefault()
sendKey(key,"keyup")
})

})

/* DEVICE DETECTION */

const controls=document.getElementById("mobileControls")
const toggle=document.getElementById("toggleControls")

function isTouch(){

return (
'ontouchstart' in window ||
navigator.maxTouchPoints>0
)

}

if(!isTouch()){

controls.style.display="none"
toggle.textContent="Show Controls"

}

/* TOGGLE */

toggle.onclick=()=>{

if(controls.style.display==="none"){

controls.style.display="flex"
toggle.textContent="Hide Controls"

}else{

controls.style.display="none"
toggle.textContent="Show Controls"

}

}

/* JOYSTICK MOVEMENT */

const joystick=document.getElementById("joystick")
const stick=document.getElementById("stick")

let active=false

joystick.addEventListener("touchstart",()=>{

active=true

})

joystick.addEventListener("touchend",()=>{

active=false

stick.style.left="35px"
stick.style.top="35px"

sendKey("ArrowUp","keyup")
sendKey("ArrowDown","keyup")
sendKey("ArrowLeft","keyup")
sendKey("ArrowRight","keyup")

})

joystick.addEventListener("touchmove",(e)=>{

if(!active)return

const rect=joystick.getBoundingClientRect()

const x=e.touches[0].clientX-rect.left
const y=e.touches[0].clientY-rect.top

const dx=x-60
const dy=y-60

const distance=Math.sqrt(dx*dx+dy*dy)

const max=40

const clampedX=Math.max(-max,Math.min(max,dx))
const clampedY=Math.max(-max,Math.min(max,dy))

stick.style.left=(60+clampedX-25)+"px"
stick.style.top=(60+clampedY-25)+"px"

/* MOVEMENT */

if(dy<-20){

sendKey("ArrowUp","keydown")

}else{

sendKey("ArrowUp","keyup")

}

if(dy>20){

sendKey("ArrowDown","keydown")

}else{

sendKey("ArrowDown","keyup")

}

if(dx<-20){

sendKey("ArrowLeft","keydown")

}else{

sendKey("ArrowLeft","keyup")

}

if(dx>20){

sendKey("ArrowRight","keydown")

}else{

sendKey("ArrowRight","keyup")

}

})

/* SWIPE TO TURN */

let lastX=null

document.addEventListener("touchmove",(e)=>{

const x=e.touches[0].clientX

if(lastX===null){

lastX=x
return

}

const diff=x-lastX

if(Math.abs(diff)>8){

if(diff>0){

sendKey("ArrowRight","keydown")

setTimeout(()=>sendKey("ArrowRight","keyup"),30)

}else{

sendKey("ArrowLeft","keydown")

setTimeout(()=>sendKey("ArrowLeft","keyup"),30)

}

}

lastX=x

})

document.addEventListener("touchend",()=>{

lastX=null

})

</script>

</body>
</html>
