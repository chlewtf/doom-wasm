<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>DOOM</title>

<style>
body {
  margin:0;
  background:black;
  overflow:hidden;
}

canvas {
  width:100%;
  height:100%;
  image-rendering: pixelated;
}

/* MOBILE CONTROLS */

#mobileControls{
position:fixed;
bottom:20px;
left:0;
right:0;
display:flex;
justify-content:space-between;
pointer-events:none;
z-index:10;
}

.pad{
display:grid;
grid-template-columns:70px 70px 70px;
grid-template-rows:70px 70px 70px;
gap:6px;
margin-left:15px;
pointer-events:auto;
}

.actionButtons{
display:flex;
flex-direction:column;
gap:12px;
margin-right:20px;
pointer-events:auto;
}

.ctrlBtn{
background:rgba(0,0,0,0.6);
color:white;
border:none;
border-radius:12px;
font-size:24px;
width:70px;
height:70px;
}

.ctrlBtn:active{
background:rgba(255,255,255,0.3);
}
</style>
</head>

<body>

<canvas id="canvas" oncontextmenu="event.preventDefault()"></canvas>

<!-- ERUDA MOBILE CONSOLE -->
<script src="https://cdn.jsdelivr.net/npm/eruda"></script>
<script>
eruda.init();
</script>

<script>
var Module = {
  canvas: document.getElementById('canvas'),

  print: function(text) {
    console.log(text);
  },

  printErr: function(text) {
    console.error(text);
  },

  setStatus: function(text) {
    console.log(text);
  },

  monitorRunDependencies: function(left) {}
};
</script>

<!-- EMSCRIPTEN GAME -->
<script src="chocolate-doom.js"></script>


<!-- MOBILE CONTROLS UI -->

<div id="mobileControls">

<div class="pad">
<div></div>
<button class="ctrlBtn" data-key="ArrowUp">▲</button>
<div></div>

<button class="ctrlBtn" data-key="ArrowLeft">◀</button>
<div></div>
<button class="ctrlBtn" data-key="ArrowRight">▶</button>

<div></div>
<button class="ctrlBtn" data-key="ArrowDown">▼</button>
<div></div>
</div>

<div class="actionButtons">
<button class="ctrlBtn" data-key=" ">🔥</button>
<button class="ctrlBtn" data-key="e">USE</button>
</div>

</div>


<!-- TOUCH → KEYBOARD -->

<script>
function sendKey(key,type){
const e = new KeyboardEvent(type,{key:key});
window.dispatchEvent(e);
}

document.querySelectorAll(".ctrlBtn").forEach(btn=>{
const key = btn.dataset.key;

btn.addEventListener("touchstart",e=>{
e.preventDefault();
sendKey(key,"keydown");
});

btn.addEventListener("touchend",e=>{
e.preventDefault();
sendKey(key,"keyup");
});
});
</script>

</body>
</html>
